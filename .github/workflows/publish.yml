name: Publish to Comfy Registry

# 自動發版：push 到 main 且 pyproject.toml 變動（版號 bump）時觸發；亦可手動觸發。
# 需在 repo Settings → Secrets 加 REGISTRY_ACCESS_TOKEN（registry.comfy.org 的 API key）。
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
